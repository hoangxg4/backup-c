name: Silent GitOps Backup
on:
  workflow_dispatch: # Chỉ chạy khi bạn nhấn nút hoặc gọi API từ Cronjob bên ngoài
  # schedule:
  #   - cron: '0 */6 * * *'

jobs:
  silent-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Logic
        uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          mkdir -p ~/.ssh ~/.config/rclone
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_backup_key
          chmod 600 ~/.ssh/id_backup_key
          echo "${{ secrets.RCLONE_CONFIG_CONTENT }}" > ~/.config/rclone/rclone.conf

      - name: Stealth Execution
        run: |
          curl -s -H "Authorization: token ${{ secrets.GH_PAT }}" \
               -L "${{ secrets.SERVER_LIST_URL }}" -o server_list.txt

          while IFS='|' read -r IP_PORT HOSTNAME; do
            [[ $IP_PORT =~ ^# || -z $IP_PORT ]] && continue
            
            echo "::add-mask::$IP_PORT"
            echo "::add-mask::$HOSTNAME"
            
            IP=$(echo $IP_PORT | cut -d':' -f1); PORT=$(echo $IP_PORT | cut -s -d':' -f2); PORT=${PORT:-22}
            
            # --- FIX LỖI TẠI ĐÂY ---
            # Bước 1: Tạo thư mục đích trên VPS TRƯỚC KHI SCP
            ssh -q -p $PORT -i ~/.ssh/id_backup_key -o StrictHostKeyChecking=no root@$IP "mkdir -p ~/.config/rclone /usr/local/bin && echo '$HOSTNAME' > /etc/vps_id"

            # Bước 2: Đẩy file (Dùng đường dẫn tuyệt đối /root/ để đảm bảo không lỗi)
            scp -q -P $PORT -i ~/.ssh/id_backup_key ~/.config/rclone/rclone.conf root@$IP:/root/.config/rclone/rclone.conf
            scp -q -P $PORT -i ~/.ssh/id_backup_key ./backup_logic.sh root@$IP:/usr/local/bin/vps-manager
            
            # Bước 3: Cấp quyền và chạy backup
            ssh -q -p $PORT -i ~/.ssh/id_backup_key root@$IP "chmod +x /usr/local/bin/vps-manager && /usr/local/bin/vps-manager backup"
            
            echo "Processed a node successfully."
          done < server_list.txt
