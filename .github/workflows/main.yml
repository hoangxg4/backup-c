name: Global Silent Backup
on:
  #schedule:
    #- cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup SSH Key & Local Files
        env:
          RCLONE_CONTENT: ${{ secrets.RCLONE_CONFIG_CONTENT }}
        run: |
          mkdir -p ~/.ssh ~/.config/rclone
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_backup_key
          chmod 600 ~/.ssh/id_backup_key
          
          if [ -z "$RCLONE_CONTENT" ]; then
            echo "❌ LỖI: Không tìm thấy Secret 'RCLONE_CONFIG_CONTENT'!"
            exit 1
          fi
          echo "$RCLONE_CONTENT" > ~/.config/rclone/rclone.conf
          chmod +x ./backup_logic.sh

      - name: Execution with Parallel & Silent Logs
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          SSH_OPTS: "-i ~/.ssh/id_backup_key -o StrictHostKeyChecking=no -o ConnectTimeout=15 -o ServerAliveInterval=30"
        run: |
          export GH_TOKEN="${{ secrets.GH_PAT }}"
          export LIST_URL="${{ secrets.SERVER_LIST_URL }}"
          export SSH_OPTS
          
          # 1. Tải danh sách Server
          curl -s -H "Authorization: token $GH_TOKEN" -L "$LIST_URL" -o server_list.txt
          sed -i 's/\r//g' server_list.txt
          
          # 2. Tạo Script Worker để xử lý luồng song song
          cat << 'EOF' > worker.sh
          #!/bin/bash
          LINE="$1"
          [[ "$LINE" =~ ^# || -z "$LINE" ]] && exit 0
          
          IP_PORT=$(echo "$LINE" | cut -d'|' -f1 | tr -d ' ')
          HOSTNAME=$(echo "$LINE" | cut -d'|' -f2 | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
          IP=$(echo "$IP_PORT" | cut -d':' -f1)
          PORT=$(echo "$IP_PORT" | cut -s -d':' -f2); PORT=${PORT:-22}
          
          LOG_FILE="/tmp/log_${IP}.log"
          
          # Tiến trình thực thi cho 1 server
          {
            echo "Processing Server: $HOSTNAME ($IP:$PORT)"
            ssh -n -q -p $PORT $SSH_OPTS root@$IP "mkdir -p /root/.config/rclone /usr/local/bin && echo '$HOSTNAME' > /etc/vps_id && if ! command -v rclone &> /dev/null; then curl -s https://rclone.org/install.sh | bash; fi" || true
            scp -q -P $PORT $SSH_OPTS ~/.config/rclone/rclone.conf root@$IP:/root/.config/rclone/rclone.conf || true
            scp -q -P $PORT $SSH_OPTS ./backup_logic.sh root@$IP:/usr/local/bin/vps-manager || true
            ssh -n -q -p $PORT $SSH_OPTS root@$IP "chmod +x /usr/local/bin/vps-manager" || true
            
            RAW_OUTPUT=$(ssh -n -q -p $PORT $SSH_OPTS root@$IP "/usr/local/bin/vps-manager backup" || echo "[BACKUP_STATUS] ERROR_SSH")
            echo "$RAW_OUTPUT"
          } &> "$LOG_FILE"

          # Trả về kết quả để tiến trình chính đọc
          if grep -q "\[BACKUP_STATUS\] SUCCESS" "$LOG_FILE"; then
            SIZE=$(grep "\[BACKUP_STATUS\] SUCCESS" "$LOG_FILE" | cut -d'|' -f2)
            echo "SUCCESS|$HOSTNAME|$SIZE"
          elif grep -q "\[BACKUP_STATUS\] SKIP" "$LOG_FILE"; then
            echo "SKIP|$HOSTNAME"
          else
            echo "ERROR|$HOSTNAME|$LOG_FILE"
          fi
          EOF
          chmod +x worker.sh

          # 3. Chạy song song TẤT CẢ server cùng lúc (-P 0)
          > results.txt
          cat server_list.txt | xargs -I {} -P 0 ./worker.sh "{}" > results.txt

          # 4. Phân tích kết quả tổng hợp
          > summary.txt
          while IFS='|' read -r STATUS NAME EXTRA; do
            if [ -z "$STATUS" ]; then continue; fi
            
            if [ "$STATUS" == "SUCCESS" ]; then
              echo "- 🖥️ **$NAME**: ✅ Backup OK (\`$EXTRA\`)" >> summary.txt
            elif [ "$STATUS" == "SKIP" ]; then
              echo "- 🖥️ **$NAME**: 💤 Không đổi (Skip)" >> summary.txt
            elif [ "$STATUS" == "ERROR" ]; then
              LOG_FILE="$EXTRA"
              echo "::error title=Backup Failed::Phát hiện lỗi trên server $NAME"
              cat "$LOG_FILE"
              echo "----------------------------------------"
              
              if grep -q "\[BACKUP_STATUS\] ERROR_UPLOAD" "$LOG_FILE"; then
                echo "- 🖥️ **$NAME**: ❌ Lỗi Google Drive (Rclone)" >> summary.txt
              else
                echo "- 🖥️ **$NAME**: ❌ Offline hoặc Lỗi SSH" >> summary.txt
              fi
            fi
          done < results.txt

          # 5. Gửi báo cáo về Discord
          if [ -n "$WEBHOOK" ] && [ -s summary.txt ]; then
            jq -n --rawfile desc summary.txt '{
              embeds: [{
                title: "📊 Báo Cáo Backup Hệ Thống",
                description: $desc,
                color: 3447003,
                footer: {text: "Retention: 10 Files • Permanent Delete • No Logs/Sockets"}
              }]
            }' > discord.json
            
            curl -s -H "Content-Type: application/json" -d @discord.json "$WEBHOOK" > /dev/null
          fi
