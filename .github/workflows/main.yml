name: Global Silent Backup
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup SSH Key & Rclone Config
        run: |
          mkdir -p ~/.ssh ~/.config/rclone
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_backup_key
          chmod 600 ~/.ssh/id_backup_key
          echo "${{ secrets.RCLONE_CONFIG_BASE64 }}" | base64 -d > ~/.config/rclone/rclone.conf

      - name: Stealth Execution
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          TOKEN: ${{ secrets.GH_PAT }}
          LIST_URL: ${{ secrets.SERVER_LIST_URL }}
          SSH_OPTS: "-i ~/.ssh/id_backup_key -o StrictHostKeyChecking=no -o ConnectTimeout=15 -o ServerAliveInterval=30"
        run: |
          # Gọi bằng $TOKEN, GitHub sẽ không in dòng có chứa "***" ra màn hình nữa
          curl -s -H "Authorization: token $TOKEN" -L "$LIST_URL" -o server_list.txt

          # Làm trống file summary
          > summary.txt

          while IFS='|' read -u 3 -r IP_PORT HOSTNAME; do
            [[ $IP_PORT =~ ^# || -z $IP_PORT ]] && continue
            
            IP=$(echo "$IP_PORT" | cut -d':' -f1); PORT=$(echo "$IP_PORT" | cut -s -d':' -f2); PORT=${PORT:-22}
            
            # Đẩy file cực kỳ im lặng
            ssh -n -q -p $PORT $SSH_OPTS root@$IP "mkdir -p ~/.config/rclone /usr/local/bin && echo '$HOSTNAME' > /etc/vps_id && if ! command -v rclone &> /dev/null; then curl -s https://rclone.org/install.sh | bash; fi" < /dev/null || true
            ssh -n -q -p $PORT $SSH_OPTS root@$IP "cat > ~/.config/rclone/rclone.conf" < ~/.config/rclone/rclone.conf || true
            ssh -n -q -p $PORT $SSH_OPTS root@$IP "cat > /usr/local/bin/vps-manager && chmod +x /usr/local/bin/vps-manager" < ./backup_logic.sh || true
            
            # CHẠY VÀ BẮT LOG (Không in bất kỳ thứ gì ra màn hình GitHub)
            RAW_OUTPUT=$(ssh -n -q -p $PORT $SSH_OPTS root@$IP "/usr/local/bin/vps-manager backup 2>/dev/null" < /dev/null || echo "[BACKUP_STATUS] ERROR")
            
            # GHI KẾT QUẢ VÀO FILE ẨN (Chỉ Discord mới thấy)
            if echo "$RAW_OUTPUT" | grep -q "\[BACKUP_STATUS\] SKIP"; then
              echo "- 🖥️ **$HOSTNAME**: 💤 Không đổi (Skip)" >> summary.txt
            elif echo "$RAW_OUTPUT" | grep -q "\[BACKUP_STATUS\] SUCCESS"; then
              SIZE=$(echo "$RAW_OUTPUT" | grep "\[BACKUP_STATUS\] SUCCESS" | cut -d'|' -f2)
              echo "- 🖥️ **$HOSTNAME**: ✅ Backup OK (\`$SIZE\`)" >> summary.txt
            elif echo "$RAW_OUTPUT" | grep -q "\[BACKUP_STATUS\] ERROR_UPLOAD"; then
              echo "- 🖥️ **$HOSTNAME**: ❌ Lỗi Google Drive (Rclone)" >> summary.txt
            else
              echo "- 🖥️ **$HOSTNAME**: ❌ Offline hoặc Timeout" >> summary.txt
            fi
            
          done 3< server_list.txt

          # GỬI DISCORD BÍ MẬT
          if [ -n "$WEBHOOK" ] && [ -s summary.txt ]; then
            jq -n --rawfile desc summary.txt '{
              embeds: [{
                title: "📊 Báo Cáo Backup Hệ Thống",
                description: $desc,
                color: 3447003,
                footer: {text: "Retention: 10 Files • Permanent Delete • No Logs/Sockets"}
              }]
            }' > discord.json
            
            curl -s -H "Content-Type: application/json" -d @discord.json "$WEBHOOK" > /dev/null
          fi
