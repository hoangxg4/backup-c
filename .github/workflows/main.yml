name: Global Silent Backup
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup SSH Key & Local Files
        env:
          RCLONE_CONTENT: ${{ secrets.RCLONE_CONFIG_CONTENT }}
        run: |
          mkdir -p ~/.ssh ~/.config/rclone
          # 1. Tạo SSH Key
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_backup_key
          chmod 600 ~/.ssh/id_backup_key
          
          # 2. Ghi trực tiếp nội dung raw vào file rclone.conf
          if [ -z "$RCLONE_CONTENT" ]; then
            echo "❌ LỖI: Không tìm thấy Secret 'RCLONE_CONFIG_CONTENT' trên GitHub!"
            exit 1
          fi
          echo "$RCLONE_CONTENT" > ~/.config/rclone/rclone.conf

          # 3. DEBUG TRÊN GITHUB RUNNER: Kiểm tra xem file đã có dữ liệu chưa
          FILE_SIZE=$(wc -c < ~/.config/rclone/rclone.conf)
          echo "=== DEBUG TRÊN GITHUB RUNNER ==="
          echo "Kích thước file rclone.conf tạo ra: $FILE_SIZE bytes"
          if [ "$FILE_SIZE" -eq 0 ]; then
            echo "❌ LỖI: File rclone.conf vẫn bị 0 bytes. Vui lòng kiểm tra lại giá trị Secret!"
            exit 1
          fi
          echo "================================="
          chmod +x ./backup_logic.sh

      - name: Execution with SCP
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          SSH_OPTS: "-i ~/.ssh/id_backup_key -o StrictHostKeyChecking=no -o ConnectTimeout=15 -o ServerAliveInterval=30"
        run: |
          export GH_TOKEN="${{ secrets.GH_PAT }}"
          export LIST_URL="${{ secrets.SERVER_LIST_URL }}"
          
          # Tải danh sách Server
          curl -s -H "Authorization: token $GH_TOKEN" -L "$LIST_URL" -o server_list.txt
          sed -i 's/\r//g' server_list.txt
          
          > summary.txt

          while IFS='|' read -u 3 -r IP_PORT HOSTNAME; do
            [[ "$IP_PORT" =~ ^# || -z "$IP_PORT" ]] && continue
            
            IP_PORT=$(echo "$IP_PORT" | tr -d ' ')
            HOSTNAME=$(echo "$HOSTNAME" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
            
            IP=$(echo "$IP_PORT" | cut -d':' -f1)
            PORT=$(echo "$IP_PORT" | cut -s -d':' -f2); PORT=${PORT:-22}
            
            echo "::add-mask::$IP"
            echo "::add-mask::$HOSTNAME"
            
            echo "----------------------------------------"
            echo "Processing Server: ***" 
            
            # 1. Tạo thư mục trên VPS
            ssh -n -q -p $PORT $SSH_OPTS root@$IP "mkdir -p /root/.config/rclone /usr/local/bin && echo '$HOSTNAME' > /etc/vps_id && if ! command -v rclone &> /dev/null; then curl -s https://rclone.org/install.sh | bash; fi" || true
            
            # 2. Dùng SCP để đẩy file qua (Giống như WinSCP) - Copy file sao y bản chính 100%
            scp -q -P $PORT $SSH_OPTS ~/.config/rclone/rclone.conf root@$IP:/root/.config/rclone/rclone.conf || true
            scp -q -P $PORT $SSH_OPTS ./backup_logic.sh root@$IP:/usr/local/bin/vps-manager || true
            
            # 3. DEBUG TRÊN VPS: Xem kích thước file sau khi truyền qua
            echo "--- DEBUG TRÊN VPS ---"
            ssh -n -q -p $PORT $SSH_OPTS root@$IP "ls -la /root/.config/rclone/rclone.conf && echo 'File trên VPS nhận được:' && wc -c < /root/.config/rclone/rclone.conf" || true
            echo "----------------------"

            # 4. Chạy backup
            ssh -n -q -p $PORT $SSH_OPTS root@$IP "chmod +x /usr/local/bin/vps-manager" || true
            RAW_OUTPUT=$(ssh -n -q -p $PORT $SSH_OPTS root@$IP "/usr/local/bin/vps-manager backup" || echo "[BACKUP_STATUS] ERROR_SSH")
            
            echo "$RAW_OUTPUT"
            
            # 5. Phân tích kết quả
            if echo "$RAW_OUTPUT" | grep -q "\[BACKUP_STATUS\] SKIP"; then
              echo "- 🖥️ **$HOSTNAME**: 💤 Không đổi (Skip)" >> summary.txt
            elif echo "$RAW_OUTPUT" | grep -q "\[BACKUP_STATUS\] SUCCESS"; then
              SIZE=$(echo "$RAW_OUTPUT" | grep "\[BACKUP_STATUS\] SUCCESS" | cut -d'|' -f2)
              echo "- 🖥️ **$HOSTNAME**: ✅ Backup OK (\`$SIZE\`)" >> summary.txt
            elif echo "$RAW_OUTPUT" | grep -q "\[BACKUP_STATUS\] ERROR_UPLOAD"; then
              echo "- 🖥️ **$HOSTNAME**: ❌ Lỗi Google Drive (Rclone)" >> summary.txt
            else
              echo "- 🖥️ **$HOSTNAME**: ❌ Offline hoặc Lỗi SSH" >> summary.txt
            fi
            
          done 3< server_list.txt

          # 6. Gửi báo cáo về Discord
          if [ -n "$WEBHOOK" ] && [ -s summary.txt ]; then
            jq -n --rawfile desc summary.txt '{
              embeds: [{
                title: "📊 Báo Cáo Backup Hệ Thống",
                description: $desc,
                color: 3447003,
                footer: {text: "Retention: 10 Files • Permanent Delete • No Logs/Sockets"}
              }]
            }' > discord.json
            
            curl -s -H "Content-Type: application/json" -d @discord.json "$WEBHOOK" > /dev/null
          fi
