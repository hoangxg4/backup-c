name: Global Silent Backup
on:
  schedule:
    - cron: '0 */6 * * *' # 6 tiếng chạy 1 lần
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_backup_key
          chmod 600 ~/.ssh/id_backup_key

      - name: Setup Rclone Config
        run: |
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONFIG_BASE64 }}" | base64 -d > ~/.config/rclone/rclone.conf

      - name: Execute Backup on All Servers
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          # Cấu hình SSH tối ưu: Chống treo, tự nhận diện key, timeout 15s
          SSH_OPTS: "-i ~/.ssh/id_backup_key -o StrictHostKeyChecking=no -o ConnectTimeout=15 -o ServerAliveInterval=30"
        run: |
          curl -s -H "Authorization: token ${{ secrets.GH_PAT }}" \
               -L "${{ secrets.SERVER_LIST_URL }}" -o server_list.txt

          DISCORD_SUMMARY=""

          while IFS='|' read -u 3 -r IP_PORT HOSTNAME; do
            [[ $IP_PORT =~ ^# || -z $IP_PORT ]] && continue
            
            IP=$(echo $IP_PORT | cut -d':' -f1); PORT=$(echo $IP_PORT | cut -s -d':' -f2); PORT=${PORT:-22}
            echo "::group::Processing $HOSTNAME"

            # 1. Chuẩn bị môi trường (Nếu lỗi kết nối sẽ bỏ qua sang server sau nhờ || true)
            ssh -n -q -p $PORT $SSH_OPTS root@$IP "mkdir -p ~/.config/rclone /usr/local/bin && echo '$HOSTNAME' > /etc/vps_id && if ! command -v rclone &> /dev/null; then curl https://rclone.org/install.sh | bash; fi" < /dev/null || true
            scp -q -P $PORT $SSH_OPTS ~/.config/rclone/rclone.conf root@$IP:/root/.config/rclone/rclone.conf || true
            scp -q -P $PORT $SSH_OPTS ./backup_logic.sh root@$IP:/usr/local/bin/vps-manager || true
            
            # 2. Chạy Backup và lấy kết quả
            RAW_OUTPUT=$(ssh -n -q -p $PORT $SSH_OPTS root@$IP "chmod +x /usr/local/bin/vps-manager && /usr/local/bin/vps-manager backup" < /dev/null || echo "[BACKUP_STATUS] ERROR")
            echo "$RAW_OUTPUT"

            # 3. Tổng hợp báo cáo
            if echo "$RAW_OUTPUT" | grep -q "\[BACKUP_STATUS\] SKIP"; then
              DISCORD_SUMMARY+="- 🖥️ **$HOSTNAME**: 💤 Không đổi (Skip)\n"
            elif echo "$RAW_OUTPUT" | grep -q "\[BACKUP_STATUS\] SUCCESS"; then
              SIZE=$(echo "$RAW_OUTPUT" | grep "\[BACKUP_STATUS\] SUCCESS" | cut -d'|' -f2)
              DISCORD_SUMMARY+="- 🖥️ **$HOSTNAME**: ✅ Backup OK (\`$SIZE\`)\n"
            else
              DISCORD_SUMMARY+="- 🖥️ **$HOSTNAME**: ❌ Offline hoặc Lỗi kết nối\n"
            fi
            echo "::endgroup::"
            
          done 3< server_list.txt

          # 4. Gửi Discord duy nhất 1 lần
          if [ -n "$WEBHOOK" ]; then
            jq -n --arg desc "$DISCORD_SUMMARY" '{
              embeds: [{
                title: "📊 Báo Cáo Backup Hệ Thống",
                description: $desc,
                color: 3447003,
                footer: {text: "Retention: 10 Files • Permanent Delete • No Logs/Sockets"}
              }]
            }' > discord.json
            curl -s -H "Content-Type: application/json" -d @discord.json "$WEBHOOK" > /dev/null
          fi
